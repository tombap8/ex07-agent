<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Calc - Modern Web Calculator</title>
  <meta name="description" content="A beautiful, responsive web calculator with glassmorphism design, dark/light modes, keyboard support, and history tracking.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Decorative Background Glow Orbs -->
  <div class="glow-orb orb-1" id="orb1"></div>
  <div class="glow-orb orb-2" id="orb2"></div>

  <!-- Header with Utilities -->
  <header>
    <div class="brand">AURA CALC</div>
    <div class="header-actions">
      <!-- Theme Switch Button -->
      <button class="header-btn" id="theme-toggle" title="테마 변경" aria-label="Toggle Theme">
        <!-- Sun Icon (Visible in dark theme by default) -->
        <svg id="theme-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path>
          <path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
        <!-- Moon Icon (Hidden by default, shown in light theme) -->
        <svg id="theme-moon" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
      </button>

      <!-- History Button -->
      <button class="header-btn" id="history-toggle" title="계산 기록" aria-label="View History">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Calculator Screen -->
  <main class="calc-container">
    <div class="calculator">
      <!-- Calculator Display -->
      <section class="display" aria-live="polite">
        <div class="formula-line" id="display-formula"></div>
        <div class="result-line" id="display-result">0</div>
      </section>

      <!-- Calculator Keypad -->
      <section class="keypad">
        <!-- Row 1 -->
        <button class="btn btn-fn" id="btn-clear" aria-label="Clear All">C</button>
        <button class="btn btn-fn" id="btn-backspace" aria-label="Backspace">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
            <line x1="18" y1="9" x2="12" y2="15"></line>
            <line x1="12" y1="9" x2="18" y2="15"></line>
          </svg>
        </button>
        <button class="btn btn-op" data-action="percent" aria-label="Percent">%</button>
        <button class="btn btn-op" data-val="/" aria-label="Divide">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-val="7">7</button>
        <button class="btn btn-num" data-val="8">8</button>
        <button class="btn btn-num" data-val="9">9</button>
        <button class="btn btn-op" data-val="*" aria-label="Multiply">×</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-val="4">4</button>
        <button class="btn btn-num" data-val="5">5</button>
        <button class="btn btn-num" data-val="6">6</button>
        <button class="btn btn-op" data-val="-" aria-label="Subtract">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-val="1">1</button>
        <button class="btn btn-num" data-val="2">2</button>
        <button class="btn btn-num" data-val="3">3</button>
        <button class="btn btn-op" data-val="+" aria-label="Add">+</button>

        <!-- Row 5 (0 spans 2 columns, = spans 2 rows vertically) -->
        <button class="btn btn-num double-width" data-val="0">0</button>
        <button class="btn btn-num" data-val=".">.</button>
        <button class="btn btn-equals" id="btn-equals" aria-label="Equals">=</button>
      </section>
    </div>

    <!-- Keyboard Shortcut Guide -->
    <footer class="kbd-guide">
      <p>키패드 및 키보드 입력 지원</p>
      <p style="margin-top: 4px; opacity: 0.7;">
        <span class="kbd-badge">Enter</span> 수식 계산 &nbsp;|&nbsp;
        <span class="kbd-badge">Esc</span> 초기화 &nbsp;|&nbsp;
        <span class="kbd-badge">Backspace</span> 지우기
      </p>
    </footer>
  </main>

  <!-- History Sidebar Drawer -->
  <aside class="history-drawer" id="history-drawer">
    <div class="history-header">
      <h2>계산 기록</h2>
      <button class="history-close-btn" id="history-close" aria-label="Close History">✕</button>
    </div>
    <div class="history-list" id="history-list" aria-live="polite">
      <!-- Saved items will render here dynamically -->
    </div>
    <div class="history-footer">
      <button class="clear-history-btn" id="btn-clear-history">기록 전체 삭제</button>
    </div>
  </aside>

  <!-- Overlay for closing history drawer -->
  <div class="overlay" id="overlay"></div>

  <script src="js/app.js"></script>
</body>
</html>
